name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Validate
    runs-on: arc-linux-claude-memory-mcp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci
      - run: node --check index.js

name: release-please
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Prefer a PAT (RELEASE_PAT) when set so release-please can create
          # PRs even if the repo/org has "Allow GitHub Actions to create and
          # approve pull requests" disabled. Fall back to github.token so the
          # workflow doesn't hard-fail on unset/empty secret. See
          # docs/troubleshooting.md for the failure modes this guards against.
          token: ${{ secrets.RELEASE_PAT || github.token }}

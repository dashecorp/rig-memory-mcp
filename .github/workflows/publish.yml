name: Publish

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - run: npm ci

      # Idempotent publish: this workflow runs on every push to main, but the
      # version in package.json only bumps when a release-please PR merges.
      # Without this guard, every non-release push fails with
      # `E409 Cannot publish over existing version` and reddens main.
      # See docs/troubleshooting.md → "npm publish fails with E409".
      - name: Publish to GitHub Packages (idempotent)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          OUTPUT=$(npm publish 2>&1)
          CODE=$?
          echo "$OUTPUT"
          if [ $CODE -eq 0 ]; then
            exit 0
          fi
          if echo "$OUTPUT" | grep -qE 'E409|Cannot publish over existing version'; then
            VERSION=$(node -p "require('./package.json').version")
            echo "::notice::Version $VERSION already published — treating as no-op (waiting for release-please to bump)."
            exit 0
          fi
          exit $CODE

  publish-docker:
    name: Publish Docker image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

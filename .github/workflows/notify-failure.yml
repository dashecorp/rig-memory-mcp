name: CI Failure → Discord

# Posts a Discord notification to #ci-failures when any workflow on the
# default branch (main) fails or times out.
#
# Skips:
#   - PR-triggered runs  (event != 'pull_request')
#   - Reruns             (run_attempt == 1 only → no double-post on retry)
#
# The notification logic lives in the reusable called workflow:
#   dashecorp/rig-gitops/.github/workflows/notify-failure-called.yml
#
# Secret required (org-level, no per-repo setup needed):
#   DISCORD_WEBHOOK_CI_FAILURES

on:
  workflow_run:
    workflows: ["*"]
    types: [completed]
    branches: [main]

permissions: {}

# Deduplicate: if GitHub delivers the same completion event twice for the same
# run+attempt, only one notification fires (cancel-in-progress drops the dupe).
concurrency:
  group: ci-failure-${{ github.event.workflow_run.id }}-${{ github.event.workflow_run.run_attempt }}
  cancel-in-progress: true

jobs:
  notify:
    # Only fire for first-attempt failures/timeouts of non-PR runs.
    # run_attempt == 1 ensures reruns of a previously-failing run don't re-post.
    if: "(github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'timed_out') && github.event.workflow_run.event != 'pull_request' && github.event.workflow_run.run_attempt == 1"
    uses: dashecorp/rig-gitops/.github/workflows/notify-failure-called.yml@main
    with:
      repo: ${{ github.repository }}
      workflow_name: ${{ github.event.workflow_run.name }}
      run_id: ${{ github.event.workflow_run.id }}
      run_url: ${{ github.event.workflow_run.html_url }}
      sha: ${{ github.event.workflow_run.head_sha }}
      actor: ${{ github.event.workflow_run.actor.login }}
      conclusion: ${{ github.event.workflow_run.conclusion }}
    secrets: inherit
